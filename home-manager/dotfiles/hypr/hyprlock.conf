background {
    monitor =
    path = screenshot          # Capture your current desktop background
    blur_passes = 3            # Smooth high-quality blur
    blur_size = 8
    noise = 0.0117
    contrast = 0.85
    brightness = 0.45          # Deep dark overlay to match your slate translucent bar vibe
    vibrancy = 0.1696
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.28 
    dots_spacing = 0.20 
    dots_center = true

    # Tokyo Night Pill Theme 
    outer_color = rgb(122, 162, 247)         # Active Workspace Blue (#7aa2f7)
    inner_color = rgb(36, 40, 59)            # Capsule Background (#24283b)
    font_color = rgb(192, 202, 245)          # Waybar Foreground text (#c0caf5)
    
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    rounding = 8                             # Matches your Waybar's capsule border-radius

    position = 0, -40
    halign = center
    valign = center
}

# Clock (Themed exactly like your waybar #clock module)
label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgb(122, 162, 247)               # Clock Bright Blue (#7aa2f7)
    font_size = 64
    font_family = JetBrainsMono Nerd Font    # Exact match from your global reset rule
    font_weight = bold
    position = 0, 60
    halign = center
    valign = center
}

# User Greeting Module
label {
    monitor =
    text = Welcome back, $USER
    color = rgb(169, 177, 214)               # Subdued Capsule Text (#a9b1d6)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    font_weight = bold
    position = 0, 140
    halign = center
    valign = center
}
